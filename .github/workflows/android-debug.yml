name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "app.js"
      - "styles.css"
      - "manifest.json"
      - "icon.svg"
      - "reset.html"
      - "android/**"

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Sync web assets into Android project
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path android/app/src/main/assets/web -Force | Out-Null
          $files = @(
            "index.html",
            "app.js",
            "styles.css",
            "manifest.json",
            "icon.svg",
            "reset.html"
          )

          foreach ($file in $files) {
            Copy-Item -LiteralPath $file -Destination "android/app/src/main/assets/web/$file" -Force
          }

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: alyamama-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
