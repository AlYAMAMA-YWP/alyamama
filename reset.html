<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>إعادة تشغيل التطبيق</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        color: #06135c;
        background: #f8fafc;
        font-family: Tahoma, "Segoe UI", sans-serif;
      }
      main {
        width: min(480px, calc(100% - 32px));
        border: 1px solid #d9dee7;
        border-radius: 8px;
        padding: 24px;
        background: #fff;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>جاري تحديث التطبيق</h1>
      <p>سيتم فتح النسخة الجديدة تلقائياً خلال لحظات.</p>
    </main>
    <script>
      async function resetAppCache() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        location.replace("./index.html?v=20260425-5");
      }

      resetAppCache().catch(() => location.replace("./index.html?v=20260425-5"));
    </script>
  </body>
</html>
